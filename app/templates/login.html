                        "background-dark": "#0a0e17",

<div class="relative min-h-screen w-full flex items-center justify-center cinematic-bg overflow-hidden">

    <a href="/">

<span class="material-symbols-outlined text-lg">error</span>

</div>

</div>
<div>
<div class="flex justify-between items-center mb-2">
<label class="text-sm font-medium text-slate-300">Password</label>
<a class="text-xs text-primary hover:underline font-medium" href="#">Forgot password?</a>
</div>
<div class="relative">
<input class="w-full bg-slate-900/50 border border-slate-700 rounded-lg h-12 px-4 pr-12 text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all placeholder:text-slate-600" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between">

<span class="text-sm text-slate-400 group-hover:text-slate-200 transition-colors">Remember me</span>
</label>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3 px-4 rounded-lg shadow-lg shadow-primary/20 transition-all flex items-center justify-center gap-2 group" type="submit">
                        Log In
                        <span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>

<div class="flex-grow border-t border-slate-800"></div>
<span class="flex-shrink mx-4 text-slate-500 text-xs uppercase tracking-widest font-semibold">Or continue with</span>
<div class="flex-grow border-t border-slate-800"></div>

<div class="flex items-center gap-2 text-[10px] text-slate-500 uppercase tracking-widest font-bold">

<div class="mt-12 flex justify-center gap-6 text-xs text-slate-600 font-medium">
<a class="hover:text-slate-400 transition-colors" href="#">Privacy Policy</a>

</div>
</div>
