name: Code Depth of Conditional Nesting Analysis

on:
  push:
    branches: [ "**" ]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ "**" ]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Identify Changed Files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **.py

      - name: Execute Nesting Calculation
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          python .github/scripts/depth_conditional_nesting.py ${{ steps.changed-files.outputs.all_changed_files }}

      - name: Archive Quality Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nesting-quality-report
          path: nesting_metrics.json