name: Issues Histogram

on:
  schedule:
    - cron: "0 3 * * 1"   # every monday at 3:00
  workflow_dispatch:

jobs:
  generate-graph:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests matplotlib

      - name: Run issues histogram script
        env:
          GITHUB_TOKEN: ${{ secrets.HISTORY_TOKEN }}
        run: python histogram.py

      - name: Upload histogram artifact
        uses: actions/upload-artifact@v4
        with:
          name: issues-per-week-graph
          path: issues_per_week.png